name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      # Trusted Publishing (OIDC) requires npm 11.5.1+; bundled npm in the
      # runner is 10.x. Pin a known-good npm rather than npm@latest: 12.0.0
      # (the current latest) ships a broken --provenance path that fails with
      # "Cannot find module 'sigstore'". 11.18.0 is the last stable 11.x.
      - name: Publish
        run: npx -y npm@11.18.0 publish --provenance --access public
