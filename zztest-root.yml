name: No MCP secret files

# Reject any push/PR that commits a local MCP config — these can carry API tokens
# (.mcp.json / .cursor/mcp.json hold bearer tokens). Pairs with the gitignore;
# backstop where push rulesets can't reach (public repos, Free-plan orgs).
on:
  push:
  pull_request:

jobs:
  block-mcp-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject .mcp.json / .cursor/mcp.json
        run: |
          matches=$(git ls-files | grep -E '(^|/)\.mcp\.json$|(^|/)\.cursor/mcp\.json$' || true)
          if [ -n "$matches" ]; then
            echo "::error::Committed MCP config file(s) detected — they can contain API tokens. Remove + gitignore them:"
            echo "$matches"
            exit 1
          fi
          echo "OK — no MCP config files tracked."
